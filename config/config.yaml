hik:
  ip: "192.168.0.249"
  port: 8000
  user: "admin"
  password: "vision123456"
  channel: 1
  rtsp_url: "rtsp://admin:vision123456@192.168.0.249:554/Streaming/Channels/101"
  sdk_lib_dir: "HCNetSDKV6.1.11.5_build20251204_linux64_ZH_20260320152102/HCNetSDKV6.1.11.5_build20251204_linux64_ZH/库文件"
  isapi_enabled: true

patrol:
  presets: [1, 2, 3, 4]
  dwell: 4.0
  min_confirm_frames: 3

models:
  face_wide:  "models/facedect/1280/best.onnx"
  face_close: "models/facedect/640/model.onnx"
  arcface:    "models/facerecognize/model.onnx"
  reid:       "models/reid/osnet_x0_25.onnx"
  person:     "models/person/yolov8n.onnx"

runtime:
  prefer_gpu: true

detect:
  face_wide_conf:  0.50
  face_wide_iou:   0.5
  face_close_conf: 0.35
  face_close_iou:  0.5
  person_conf:     0.45
  person_iou:      0.5
  edge_reject_enabled: true
  edge_margin:     5

track:
  iou_weight:  0.6
  reid_weight: 0.4
  max_age:     30
  min_hits:    3
  reid_ema:    0.1

ptz:
  expand_ratio:    1.5
  settle_diff_th:  5.0
  settle_timeout:  2.0
  settle_timeout_long:  2.5
  settle_timeout_short: 1.0
  focus_min_laplacian: 50.0
  min_wait_after_cmd:  0.8
  min_wait_after_zoom: 1.0
  motion_th:           15.0
  stable_frames:       3

capture:
  min_samples: 3
  max_samples: 5
  timeout:     3.0
  quality_blur_th: 50.0

  tracking:
    enabled: true
    safe_zone_ratio: 0.75
    correction_settle: 0.5
    max_corrections: 3
    face_lost_kalman_ms: 500
    face_lost_giveup_ms: 1200

recognize:
  match_th:  0.35
  reject_th: 0.20

reid:
  cross_preset_th: 0.5

display:
  mode: "web"
  web_host: "0.0.0.0"
  web_port: 18080
  jpeg_quality: 90

output:
  strangers_dir: "output/strangers"
  events_jsonl:  "output/events.jsonl"

log:
  level: "INFO"
  file:  "logs/app.log"
